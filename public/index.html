<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator 4 Me — 3,854 Calculators</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--sidebar:#f0f4ff;--card:#f5f7ff;--card2:#eaedfa;
  --border:#d0d7f0;--text:#1a2140;--muted:#5a6a9a;--accent:#3a7ef5;
  --accent2:#6c48f0;--green:#0a7c5c;--red:#d63550;--yellow:#b88a00;
  --orange:#c96a10;--header-h:64px;
}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
a{color:inherit;text-decoration:none}
/* ── HEADER ── */
#header{
  position:fixed;top:0;left:0;right:0;height:var(--header-h);
  background:#fff;border-bottom:2px solid var(--border);
  display:flex;align-items:center;gap:16px;padding:0 24px;z-index:100;
  box-shadow:0 2px 12px rgba(58,126,245,.08);
}
#logo{font-size:24px;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap;letter-spacing:-0.5px}
#logo span{font-size:12px;font-weight:500;-webkit-text-fill-color:var(--muted);display:block;line-height:1.2}
#search-wrap{flex:1;max-width:820px;position:relative}
#search{
  width:100%;padding:11px 16px 11px 42px;border-radius:10px;
  border:2px solid var(--border);background:#fff;color:var(--text);
  font-size:15px;outline:none;transition:border .2s,box-shadow .2s;
  box-shadow:0 1px 4px rgba(0,0,0,.06);
}
#search:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(58,126,245,.15)}
#search-wrap svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);opacity:.5;color:var(--accent)}
#count-badge{
  margin-left:auto;font-size:12px;color:var(--muted);white-space:nowrap;
  background:var(--card);padding:5px 12px;border-radius:20px;border:1px solid var(--border);font-weight:600;
}
/* ── LAYOUT ── */
#layout{height:calc(100vh - var(--header-h));margin-top:var(--header-h);overflow:hidden}
/* ── MAIN ── */
#main{height:100%;overflow-y:auto;padding:32px 24px;max-width:1400px;margin:0 auto;width:100%}
#main::-webkit-scrollbar{width:6px}
#main::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
/* ── HOME ── */
#home-header{text-align:center;margin-bottom:32px}
#home-header h1{font-size:36px;font-weight:900;margin-bottom:8px;background:linear-gradient(135deg,var(--accent),var(--accent2),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#home-header p{color:var(--muted);font-size:16px}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:18px;margin-bottom:40px}
.cat-card{
  background:var(--card);border:2px solid var(--border);border-radius:16px;
  padding:30px 24px;cursor:pointer;transition:transform .18s,border-color .18s,box-shadow .18s;
  text-align:center;
}
.cat-card:hover{transform:translateY(-4px);border-color:var(--accent);box-shadow:0 12px 32px rgba(58,126,245,.18);background:#fff}
.cat-card .cc-icon{font-size:44px;margin-bottom:14px;display:block}
.cat-card .cc-name{font-weight:800;font-size:17px;margin-bottom:6px;color:var(--text)}
.cat-card .cc-count{font-size:13px;color:var(--muted);font-weight:500}
/* ── CATEGORY / SUBCATEGORY VIEW ── */
#view-header{margin-bottom:20px}
#view-header h2{font-size:24px;font-weight:800;margin-bottom:4px}
#view-header p{color:var(--muted);font-size:13px}
.sub-section{margin-bottom:28px}
.sub-section h3{
  font-size:14px;font-weight:700;color:var(--accent);margin-bottom:12px;
  padding-bottom:8px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;
}
.sub-section h3 .sc{font-size:11px;color:var(--muted);font-weight:400}
.calc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.calc-card{
  background:var(--card);border:1px solid var(--border);border-radius:8px;
  padding:12px 14px;cursor:pointer;transition:border-color .15s,background .15s;
  display:flex;align-items:center;justify-content:space-between;
}
.calc-card:hover{border-color:var(--accent);background:var(--card2)}
.calc-card span{font-size:13px;line-height:1.3}
.calc-card .arrow{opacity:.3;font-size:12px;flex-shrink:0;margin-left:8px}
.calc-card:hover .arrow{opacity:.8}
/* ── CALCULATOR VIEW ── */
#calc-view{max-width:720px;margin:0 auto}
#calc-view .cv-back{
  display:inline-flex;align-items:center;gap:6px;color:var(--muted);
  font-size:13px;cursor:pointer;margin-bottom:20px;padding:6px 12px;
  border-radius:6px;border:1px solid var(--border);background:var(--card);
  transition:color .15s,border-color .15s;
}
#calc-view .cv-back:hover{color:var(--text);border-color:var(--accent)}
#calc-view h2{font-size:26px;font-weight:800;margin-bottom:6px}
#calc-view .breadcrumb{font-size:12px;color:var(--muted);margin-bottom:24px}
#calc-view .breadcrumb span{color:var(--accent)}
.calc-box{
  background:var(--card);border:1px solid var(--border);border-radius:14px;padding:28px;
}
.field-row{margin-bottom:18px}
.field-row label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px;font-weight:500}
.field-row input,.field-row select{
  width:100%;padding:10px 14px;border-radius:8px;border:1px solid var(--border);
  background:var(--card2);color:var(--text);font-size:15px;outline:none;transition:border .2s;
}
.field-row input:focus,.field-row select:focus{border-color:var(--accent)}
.field-row .hint{font-size:11px;color:var(--muted);margin-top:4px}
.calc-btn{
  width:100%;padding:13px;border-radius:8px;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;
  font-size:15px;font-weight:700;transition:opacity .15s,transform .1s;margin-bottom:20px;
}
.calc-btn:hover{opacity:.9;transform:translateY(-1px)}
.result-box{
  background:var(--card2);border:1px solid var(--border);border-radius:10px;
  padding:20px;min-height:80px;display:flex;flex-direction:column;gap:10px;
}
.result-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.result-row:last-child{border-bottom:none}
.result-row .rl{font-size:13px;color:var(--muted)}
.result-row .rv{font-size:18px;font-weight:700;color:var(--green)}
.result-note{font-size:12px;color:var(--muted);line-height:1.5}
.formula-box{
  margin-top:20px;background:var(--bg);border:1px solid var(--border);border-radius:8px;
  padding:14px;font-size:12px;color:var(--muted);line-height:1.7;
}
.formula-box strong{color:var(--text);display:block;margin-bottom:6px;font-size:13px}
/* ── SEARCH RESULTS ── */
#search-results h2{font-size:20px;margin-bottom:16px;font-weight:700}
#search-results .sr-count{color:var(--muted);font-size:13px;margin-bottom:18px}
/* ── GENERIC CALC ── */
.generic-inputs{display:grid;grid-template-columns:1fr 1fr;gap:14px}
/* ── RESPONSIVE ── */
@media(max-width:768px){
  #main{padding:16px}
  .cat-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
  .calc-grid{grid-template-columns:1fr}
  .generic-inputs{grid-template-columns:1fr}
}
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;margin-right:6px}
.tag-bio{background:#d4f5eb;color:#0a7c5c}
.tag-chem{background:#ede8fd;color:#6c48f0}
.tag-phys{background:#fdecd4;color:#c96a10}
.no-result{text-align:center;padding:60px 20px;color:var(--muted)}
.no-result .nr-icon{font-size:48px;margin-bottom:12px}
/* ── LANGUAGE FOOTER ── */
#lang-footer{
  position:fixed;bottom:0;left:0;right:0;
  background:#fff;border-top:2px solid var(--border);
  padding:10px 24px;z-index:200;
  box-shadow:0 -2px 16px rgba(58,126,245,.10);
}
#lang-inner{
  display:flex;align-items:center;gap:16px;max-width:1400px;margin:0 auto;
}
#lang-label{font-size:14px;font-weight:700;color:var(--text);white-space:nowrap;display:flex;align-items:center;gap:6px}
/* ── Custom flag dropdown ── */
#lang-dropdown{position:relative;flex:1;max-width:440px}
#lang-trigger{
  display:flex;align-items:center;gap:10px;width:100%;padding:8px 14px;
  border-radius:10px;border:2px solid var(--border);background:#fff;
  cursor:pointer;transition:border .2s,box-shadow .2s;user-select:none;
}
#lang-trigger:hover{border-color:var(--accent);box-shadow:0 0 0 3px rgba(58,126,245,.1)}
#lang-trigger img{width:28px;height:20px;border-radius:3px;object-fit:cover;border:1px solid #dde}
#lang-trigger .lt-name{font-size:14px;font-weight:600;color:var(--text);flex:1}
#lang-trigger .lt-chevron{font-size:11px;color:var(--muted);transition:transform .2s}
#lang-trigger.open .lt-chevron{transform:rotate(180deg)}
#lang-panel{
  display:none;position:absolute;bottom:calc(100% + 8px);left:0;right:0;
  background:#fff;border:2px solid var(--border);border-radius:12px;
  box-shadow:0 -8px 32px rgba(0,0,0,.12);overflow:hidden;z-index:300;
}
#lang-panel.open{display:block}
.lang-opt{
  display:flex;align-items:center;gap:12px;padding:10px 16px;
  cursor:pointer;transition:background .12s;border-bottom:1px solid var(--border);
}
.lang-opt:last-child{border-bottom:none}
.lang-opt:hover{background:var(--card)}
.lang-opt.active{background:#eef3ff}
.lang-opt img{width:32px;height:22px;border-radius:3px;object-fit:cover;border:1px solid #dde;flex-shrink:0}
.lang-opt .lo-name{font-size:14px;font-weight:600;color:var(--text)}
.lang-opt .lo-native{font-size:12px;color:var(--muted);margin-left:4px}
#lang-note{font-size:12px;color:var(--muted);margin-left:auto;white-space:nowrap}
/* Push main content up so footer doesn't overlap */
#layout{padding-bottom:56px}
</style>
</head>

<script>
// ─── category metadata ───────────────────────────────────────────
const CAT_META = {
  "Biology":          {icon:"🧬", color:"#22d3a3"},
  "Chemistry":        {icon:"⚗️",  color:"#7c5ef7"},
  "Construction":     {icon:"🏗️", color:"#f78c48"},
  "Conversion":       {icon:"🔄", color:"#4f8ef7"},
  "Ecology":          {icon:"🌿", color:"#22d3a3"},
  "Everyday Life":    {icon:"🏠", color:"#f7c948"},
  "Finance":          {icon:"💰", color:"#22d3a3"},
  "Food":             {icon:"🍎", color:"#f75e6e"},
  "Health":           {icon:"❤️", color:"#f75e6e"},
  "Math":             {icon:"📐", color:"#4f8ef7"},
  "Sports":           {icon:"⚽", color:"#f78c48"},
  "Physics":          {icon:"⚡", color:"#f7c948"},
  "Statistics":       {icon:"📊", color:"#7c5ef7"},
  "Other Calculators":{icon:"🔧", color:"#7c8db5"},
};

// ─── state ────────────────────────────────────────────────────────
let state = {view:"home", cat:null, sub:null, calc:null, query:""};

// ─── build flat index ─────────────────────────────────────────────
const FLAT = [];
for (const cat in CALC_DATA) {
  for (const sub in CALC_DATA[cat]) {
    CALC_DATA[cat][sub].forEach(name => FLAT.push({cat, sub, name}));
  }
}

// ─── routing ────────────────────────────────────────────────────
function goHome() {
  state = {view:"home", cat:null, sub:null, calc:null, query:""};
  document.getElementById("search").value = "";
  renderMain();
}

function goCategory(cat) {
  state = {view:"category", cat, sub:null, calc:null, query:""};
  document.getElementById("search").value = "";
  renderMain();
}

function goSubcat(cat, sub) {
  state = {view:"subcategory", cat, sub, calc:null, query:""};
  document.getElementById("search").value = "";
  renderMain();
}

function goCalc(cat, sub, name) {
  state = {view:"calc", cat, sub, calc:name, query:""};
  document.getElementById("search").value = "";
  renderMain();
  window.scrollTo(0,0);
  document.getElementById("main").scrollTop = 0;
}

// ─── render main ────────────────────────────────────────────────
function renderMain() {
  const main = document.getElementById("main");
  if (state.view === "home")          return main.innerHTML = renderHome();
  if (state.view === "category")      return main.innerHTML = renderCategory();
  if (state.view === "subcategory")   return main.innerHTML = renderSubcategory();
  if (state.view === "calc")          return main.innerHTML = renderCalc(), initCalc();
  if (state.view === "search")        return main.innerHTML = renderSearch();
}

// ─── HOME ────────────────────────────────────────────────────────
function renderHome() {
  let cats = "";
  for (const cat in CALC_DATA) {
    const m = CAT_META[cat] || {icon:"🔷"};
    cats += `<div class="cat-card" onclick="goCategory('${cat}')">
      <div class="cc-icon">${m.icon}</div>
      <div class="cc-name">${cat}</div>
      <div class="cc-count">${CAT_COUNTS[cat]} calculators</div>
    </div>`;
  }
  return `<div id="home-header">
    <h1>Calculator 4 Me</h1>
    <p>3,854 calculators across 14 categories — search or browse by topic</p>
  </div>
  <div class="cat-grid">${cats}</div>`;
}

// ─── CATEGORY ────────────────────────────────────────────────────
function renderCategory() {
  const {cat} = state;
  const m = CAT_META[cat] || {icon:"🔷"};
  const subs = CALC_DATA[cat];
  let html = `<div id="view-header">
    <h2>${m.icon} ${cat}</h2>
    <p style="color:var(--muted);font-size:13px">${CAT_COUNTS[cat]} calculators across ${Object.keys(subs).length} subcategories</p>
  </div>`;
  for (const sub in subs) {
    const calcs = subs[sub];
    html += `<div class="sub-section">
      <h3>${sub} <span class="sc">${calcs.length} calculators</span></h3>
      <div class="calc-grid">`;
    calcs.forEach(name => {
      html += `<div class="calc-card" onclick="goCalc('${esc(cat)}','${esc(sub)}','${esc(name)}')">
        <span>${name}</span><span class="arrow">›</span>
      </div>`;
    });
    html += `</div></div>`;
  }
  return html;
}

// ─── SUBCATEGORY ─────────────────────────────────────────────────
function renderSubcategory() {
  const {cat, sub} = state;
  const m = CAT_META[cat] || {icon:"🔷"};
  const calcs = CALC_DATA[cat][sub];
  let cards = calcs.map(name =>
    `<div class="calc-card" onclick="goCalc('${esc(cat)}','${esc(sub)}','${esc(name)}')">
      <span>${name}</span><span class="arrow">›</span>
    </div>`).join("");
  return `<div id="view-header">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
      <button onclick="goCategory('${esc(cat)}')" style="background:var(--card);border:1px solid var(--border);color:var(--muted);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px">← ${cat}</button>
    </div>
    <h2>${m.icon} ${sub}</h2>
    <p style="color:var(--muted);font-size:13px">${calcs.length} calculators</p>
  </div>
  <div class="calc-grid">${cards}</div>`;
}

// ─── SEARCH ──────────────────────────────────────────────────────
function onSearch(q) {
  q = q.trim();
  if (!q) { goHome(); return; }
  state = {view:"search", cat:null, sub:null, calc:null, query:q};
  renderMain();
}

function renderSearch() {
  const q = state.query.toLowerCase();
  const results = FLAT.filter(r =>
    r.name.toLowerCase().includes(q) ||
    r.sub.toLowerCase().includes(q) ||
    r.cat.toLowerCase().includes(q)
  ).slice(0, 200);
  let cards = results.map(r =>
    `<div class="calc-card" onclick="goCalc('${esc(r.cat)}','${esc(r.sub)}','${esc(r.name)}')">
      <div>
        <span>${highlight(r.name, q)}</span><br>
        <span style="font-size:11px;color:var(--muted)">${r.cat} › ${r.sub}</span>
      </div>
      <span class="arrow">›</span>
    </div>`).join("");
  if (!results.length) cards = `<div class="no-result"><div class="nr-icon">🔍</div>No calculators found for "<strong>${state.query}</strong>"</div>`;
  return `<div id="search-results">
    <h2>Search Results</h2>
    <p class="sr-count">${results.length} result${results.length!==1?"s":""} for "<strong>${state.query}</strong>"</p>
    <div class="calc-grid">${cards}</div>
  </div>`;
}

function highlight(text, q) {
  if (!q) return text;
  const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, "gi");
  return text.replace(re, `<mark style="background:rgba(79,142,247,.3);color:var(--text);border-radius:2px">$1</mark>`);
}

// ─── CALCULATOR VIEW ─────────────────────────────────────────────
function renderCalc() {
  const {cat, sub, calc} = state;
  const impl = IMPLS[calc];
  const m = CAT_META[cat] || {icon:"🔷"};
  let inner = impl ? impl.html : genericHtml(calc);
  return `<div id="calc-view">
    <div class="cv-back" onclick="goSubcat('${esc(cat)}','${esc(sub)}')">← Back to ${sub}</div>
    <h2>${calc}</h2>
    <div class="breadcrumb">${m.icon} ${cat} › <span>${sub}</span></div>
    <div class="calc-box">${inner}</div>
    ${impl && impl.formula ? `<div class="formula-box"><strong>Formula / Method</strong>${impl.formula}</div>` : ''}
  </div>`;
}

function genericHtml(name) {
  return `<p style="color:var(--muted);font-size:13px;margin-bottom:18px">Enter the required values below to calculate.</p>
  <div class="generic-inputs" id="generic-inputs">
    <div class="field-row"><label>Value A</label><input type="number" id="ga" placeholder="0" step="any"></div>
    <div class="field-row"><label>Value B</label><input type="number" id="gb" placeholder="0" step="any"></div>
  </div>
  <button class="calc-btn" onclick="genericCalc()">Calculate</button>
  <div class="result-box" id="result-box">
    <div style="color:var(--muted);font-size:13px;text-align:center;padding:10px">Enter values and press Calculate</div>
  </div>
  <p style="font-size:12px;color:var(--muted);margin-top:12px">This calculator provides a standardized input interface. For full formula details, consult subject-specific resources.</p>`;
}

function genericCalc() {
  const a = parseFloat(document.getElementById("ga")?.value) || 0;
  const b = parseFloat(document.getElementById("gb")?.value) || 0;
  setResult([{l:"Result (A + B)", v: fmt(a+b)}, {l:"Result (A × B)", v: fmt(a*b)}, {l:"Result (A / B)", v: b!==0 ? fmt(a/b) : "undefined"}]);
}

// ─── IMPLEMENTATIONS ─────────────────────────────────────────────
const IMPLS = {};

// helper: set results
function setResult(rows, note) {
  const box = document.getElementById("result-box");
  if (!box) return;
  let html = rows.map(r => `<div class="result-row"><span class="rl">${r.l}</span><span class="rv">${r.v}</span></div>`).join("");
  if (note) html += `<div class="result-note">${note}</div>`;
  box.innerHTML = html;
}

function fmt(n, dec=4) {
  if (!isFinite(n)) return "undefined";
  if (Math.abs(n) > 1e10 || (Math.abs(n) < 1e-4 && n!==0)) return n.toExponential(4);
  return parseFloat(n.toFixed(dec)).toLocaleString(undefined,{maximumFractionDigits:dec});
}
function fmtUnit(n, unit, dec=4) { return fmt(n,dec) + " " + unit; }

function initCalc() {
  const impl = IMPLS[state.calc];
  if (impl && impl.init) impl.init();
}

// ─────────────────── BMI ──────────────────────────────────────────
IMPLS["BMI (Body Mass Index)"] = {
  html: `<div class="field-row"><label>Weight</label><div style="display:flex;gap:8px">
    <input type="number" id="bmi-w" placeholder="70" step="any" style="flex:1">
    <select id="bmi-wu"><option value="kg">kg</option><option value="lb">lb</option></select>
  </div></div>
  <div class="field-row"><label>Height</label><div style="display:flex;gap:8px">
    <input type="number" id="bmi-h" placeholder="175" step="any" style="flex:1">
    <select id="bmi-hu"><option value="cm">cm</option><option value="in">in</option><option value="ft">ft</option></select>
  </div></div>
  <button class="calc-btn" onclick="calcBMI()">Calculate BMI</button>
  <div class="result-box" id="result-box"></div>`,
  formula: "BMI = weight(kg) / height(m)²"
};
function calcBMI() {
  let w = parseFloat(document.getElementById("bmi-w").value);
  let h = parseFloat(document.getElementById("bmi-h").value);
  const wu = document.getElementById("bmi-wu").value;
  const hu = document.getElementById("bmi-hu").value;
  if (isNaN(w)||isNaN(h)||w<=0||h<=0) return setResult([{l:"Error",v:"Enter valid values"}]);
  if (wu==="lb") w *= 0.453592;
  if (hu==="cm") h /= 100;
  else if (hu==="ft") h *= 0.3048;
  else if (hu==="in") h *= 0.0254;
  const bmi = w / (h*h);
  let cat = bmi<18.5?"Underweight":bmi<25?"Normal weight":bmi<30?"Overweight":"Obese";
  setResult([
    {l:"BMI",v:fmt(bmi,1)+" kg/m²"},
    {l:"Category",v:cat},
    {l:"Healthy range",v:"18.5 – 24.9"}
  ]);
}

// ─────────────────── AGE ─────────────────────────────────────────
IMPLS["Age Calculator"] = {
  html: `<div class="field-row"><label>Date of Birth</label><input type="date" id="age-dob"></div>
  <div class="field-row"><label>Age On Date (leave blank for today)</label><input type="date" id="age-to"></div>
  <button class="calc-btn" onclick="calcAge()">Calculate Age</button>
  <div class="result-box" id="result-box"></div>`,
  formula: "Calculates exact years, months, and days between two dates."
};
function calcAge() {
  const dob = new Date(document.getElementById("age-dob").value);
  const to  = document.getElementById("age-to").value ? new Date(document.getElementById("age-to").value) : new Date();
  if (isNaN(dob)) return setResult([{l:"Error",v:"Select date of birth"}]);

  const P=parseFloat(document.getElementById("m-p").value);

  formula:"pH = −log₁₀[H⁺]  |  pOH = −log₁₀[OH⁻]  |  pH + pOH = 14",
  init:function(){updatePhMode();}
};
function updatePhMode(){
  const m=document.getElementById("ph-mode")?.value;
  const d=document.getElementById("ph-fields");if(!d)return;
  const opts={
    h:`<div class="field-row"><label>[H⁺] (mol/L)</label><input type="number" id="ph1" step="any" placeholder="0.001"></div>`,
    oh:`<div class="field-row"><label>[OH⁻] (mol/L)</label><input type="number" id="ph1" step="any" placeholder="0.0001"></div>`,
    ka:`<div class="generic-inputs"><div class="field-row"><label>Ka</label><input type="number" id="ph1" step="any" placeholder="1.8e-5"></div><div class="field-row"><label>Concentration (mol/L)</label><input type="number" id="ph2" step="any" placeholder="0.1"></div></div>`
  };

function calcPH(){
  const m=document.getElementById("ph-mode").value;
  const v1=parseFloat(document.getElementById("ph1")?.value);

  if(m==="h") pH=-Math.log10(v1);
  else if(m==="oh") pH=14+Math.log10(v1);
  else pH=-Math.log10(Math.sqrt(v1*v2));

  setResult([{l:"pH",v:fmt(pH,4)},{l:"pOH",v:fmt(pOH,4)},{l:"[H⁺]",v:H.toExponential(4)+" mol/L"},{l:"[OH⁻]",v:OH.toExponential(4)+" mol/L"},{l:"Nature",v:nature}]);
}

  const toKg={kg:v,g:v/1000,mg:v/1e6,lb:v*0.453592,oz:v*0.0283495,st:v*6.35029,t:v*1000};
  const kg=toKg[from];
  setResult([{l:"Kilograms",v:fmt(kg,6)+" kg"},{l:"Grams",v:fmt(kg*1000,4)+" g"},{l:"Pounds",v:fmt(kg/0.453592,6)+" lb"},{l:"Ounces",v:fmt(kg/0.0283495,4)+" oz"},{l:"Stone",v:fmt(kg/6.35029,4)+" st"},{l:"Metric Tons",v:fmt(kg/1000,8)+" t"}]);
}

// ─────────────────── CAP RATE ────────────────────────────────────
IMPLS["Cap Rate"] = {
  html:`<div class="generic-inputs">
  <div class="field-row"><label>Net Operating Income (NOI) $/yr</label><input type="number" id="cap-noi" placeholder="24000" step="any"></div>
  <div class="field-row"><label>Property Value ($)</label><input type="number" id="cap-val" placeholder="300000" step="any"></div>
  </div>
  <button class="calc-btn" onclick="calcCapRate()">Calculate</button>
  <div class="result-box" id="result-box"></div>`,
  formula:"Cap Rate = NOI / Property Value × 100%"
};
function calcCapRate(){
  const noi=parseFloat(document.getElementById("cap-noi").value)||0;
  const val=parseFloat(document.getElementById("cap-val").value)||0;
  if(!val)return setResult([{l:"Error",v:"Enter property value"}]);
  setResult([{l:"Cap Rate",v:fmt(noi/val*100,2)+"%"},{l:"Gross Yield",v:fmt(noi/val*100,2)+"%"},{l:"Implied Value at 5% cap",v:"$"+fmt(noi/0.05,0)},{l:"Implied Value at 8% cap",v:"$"+fmt(noi/0.08,0)}]);
}

// ─────────────────── BINARY ──────────────────────────────────────
IMPLS["Binary to Decimal"] = IMPLS["Decimal to Binary"] = IMPLS["Hexadecimal to Decimal"] = IMPLS["Decimal to Hexadecimal"] = IMPLS["Base-N Converter"] = {
  html:`<div class="field-row"><label>Input Value</label><input type="text" id="base-in" placeholder="1010" spellcheck="false"></div>
  <div class="field-row"><label>From Base</label><select id="base-from"><option value="10">Decimal (10)</option><option value="2">Binary (2)</option><option value="16">Hexadecimal (16)</option><option value="8">Octal (8)</option></select></div>
  <button class="calc-btn" onclick="calcBase()">Convert</button>
  <div class="result-box" id="result-box"></div>`,
  init:function(){const n=state.calc;if(n.includes("Binary to Decimal"))document.getElementById("base-from").value="2";else if(n.includes("Hexadecimal to Decimal")||n.includes("Hex to"))document.getElementById("base-from").value="16";else if(n.includes("Octal to"))document.getElementById("base-from").value="8";}
};
function calcBase(){
  const v=document.getElementById("base-in").value.trim();
  const base=parseInt(document.getElementById("base-from").value);
  const dec=parseInt(v,base);
  if(isNaN(dec))return setResult([{l:"Error",v:"Invalid input for selected base"}]);
  setResult([{l:"Decimal",v:dec.toString()},{l:"Binary",v:dec.toString(2)},{l:"Hexadecimal",v:"0x"+dec.toString(16).toUpperCase()},{l:"Octal",v:"0o"+dec.toString(8)}]);
}

// ─────────────────── Ohm's Law ────────────────────────────────────
IMPLS["Ohm's Law (V=IR)"] = {
  html:`<div class="field-row"><label>Solve for</label><select id="ohm-find">
    <option value="V">Voltage (V)</option><option value="I">Current (I)</option><option value="R">Resistance (R)</option><option value="P">Power (P)</option>
  </select></div>
  <div class="generic-inputs">
  <div class="field-row"><label>Voltage (V)</label><input type="number" id="ohm-v" placeholder="" step="any"></div>
  <div class="field-row"><label>Current (A)</label><input type="number" id="ohm-i" placeholder="" step="any"></div>
  <div class="field-row"><label>Resistance (Ω)</label><input type="number" id="ohm-r" placeholder="" step="any"></div>
  </div>
  <button class="calc-btn" onclick="calcOhm()">Calculate</button>
  <div class="result-box" id="result-box"></div>`,
  formula:"V = I×R  |  I = V/R  |  R = V/I  |  P = V×I = I²R = V²/R"
};
function calcOhm(){
  const V=parseFloat(document.getElementById("ohm-v").value);
  const I=parseFloat(document.getElementById("ohm-i").value);
  const R=parseFloat(document.getElementById("ohm-r").value);
  let v=V,i=I,r=R;
  if(!isNaN(V)&&!isNaN(I)){r=V/I;}
  else if(!isNaN(V)&&!isNaN(R)){i=V/R;}
  else if(!isNaN(I)&&!isNaN(R)){v=I*R;}
  else return setResult([{l:"Error",v:"Enter any two values"}]);
  setResult([{l:"Voltage",v:fmt(v,4)+" V"},{l:"Current",v:fmt(i,4)+" A"},{l:"Resistance",v:fmt(r,4)+" Ω"},{l:"Power",v:fmt(v*i,4)+" W"},{l:"Energy (1 hr)",v:fmt(v*i/1000,4)+" kWh"}]);
}

// ─────────────────── DATE DIFFERENCE ─────────────────────────────
IMPLS["Date Difference"] = IMPLS["Days Until Event"] = IMPLS["Time Elapsed"] = {
  html:`<div class="generic-inputs">
  <div class="field-row"><label>Start Date</label><input type="date" id="dd-start"></div>
  <div class="field-row"><label>End Date</label><input type="date" id="dd-end"></div>
  </div>
  <button class="calc-btn" onclick="calcDateDiff()">Calculate</button>
  <div class="result-box" id="result-box"></div>`,
  init:function(){const t=new Date();document.getElementById("dd-start").valueAsDate=t;const e=new Date(t);e.setFullYear(e.getFullYear()+1);document.getElementById("dd-end").valueAsDate=e;}
};
function calcDateDiff(){
  const s=new Date(document.getElementById("dd-start").value);
  const e=new Date(document.getElementById("dd-end").value);
  if(isNaN(s)||isNaN(e))return setResult([{l:"Error",v:"Select both dates"}]);
  const diff=(e-s)/1000;
  const days=Math.round(diff/86400);
  let y=e.getFullYear()-s.getFullYear(),m=e.getMonth()-s.getMonth(),d=e.getDate()-s.getDate();
  if(d<0){m--;d+=new Date(e.getFullYear(),e.getMonth(),0).getDate()}
  if(m<0){y--;m+=12}
  setResult([{l:"Total Days",v:Math.abs(days).toLocaleString()},{l:"Years / Months / Days",v:`${Math.abs(y)}y ${Math.abs(m)}m ${Math.abs(d)}d`},{l:"Weeks",v:Math.floor(Math.abs(days)/7).toLocaleString()},{l:"Hours",v:(Math.abs(days)*24).toLocaleString()},{l:"Direction",v:days>=0?"Future":"Past"}]);
}

// ─────────────────── ROI ──────────────────────────────────────────
IMPLS["Return on Investment (ROI)"] = IMPLS["Real Estate ROI"] = {
  html:`<div class="generic-inputs">
  <div class="field-row"><label>Initial Investment ($)</label><input type="number" id="roi-i" placeholder="10000" step="any"></div>
  <div class="field-row"><label>Final Value / Return ($)</label><input type="number" id="roi-f" placeholder="13500" step="any"></div>
  <div class="field-row"><label>Time Period (years)</label><input type="number" id="roi-t" placeholder="3" step="any"></div>
  </div>
  <button class="calc-btn" onclick="calcROI()">Calculate ROI</button>
  <div class="result-box" id="result-box"></div>`,
  formula:"ROI = (Gain − Cost) / Cost × 100%  |  CAGR = (FV/PV)^(1/t) − 1"
};
function calcROI(){
  const init=parseFloat(document.getElementById("roi-i").value)||0;
  const fin=parseFloat(document.getElementById("roi-f").value)||0;
  const t=parseFloat(document.getElementById("roi-t").value)||1;
  const gain=fin-init;
  const roi=gain/init*100;
  const cagr=(Math.pow(fin/init,1/t)-1)*100;
  setResult([{l:"Net Gain / Loss",v:"$"+fmt(gain,2)},{l:"ROI",v:fmt(roi,2)+"%"},{l:"Annualized (CAGR)",v:fmt(cagr,2)+"%"}]);
}

// ─────────────────── POPULATION GROWTH ───────────────────────────
IMPLS["Population Growth Rate"] = IMPLS["Exponential Growth"] = IMPLS["Bacterial Growth Rate (μ)"] = {
  html:`<div class="generic-inputs">
  <div class="field-row"><label>Initial Population (P₀)</label><input type="number" id="pg-p0" placeholder="1000" step="any"></div>
  <div class="field-row"><label>Growth Rate (% per period)</label><input type="number" id="pg-r" placeholder="3.5" step="any"></div>
  <div class="field-row"><label>Time Periods</label><input type="number" id="pg-t" placeholder="10" step="any"></div>
  </div>
  <button class="calc-btn" onclick="calcPopGrowth()">Calculate</button>
  <div class="result-box" id="result-box"></div>`,
  formula:"P(t) = P₀ × e^(r×t)  |  Doubling time = ln(2)/r"
};
function calcPopGrowth(){
  const P0=parseFloat(document.getElementById("pg-p0").value)||0;
  const r=parseFloat(document.getElementById("pg-r").value)/100;
  const t=parseFloat(document.getElementById("pg-t").value)||0;
  const Pt=P0*Math.exp(r*t);
  const dbl=Math.log(2)/r;
  setResult([{l:"Population at t",v:fmt(Pt,2).toLocaleString()},{l:"Growth",v:"×"+fmt(Pt/P0,3)},{l:"Doubling time",v:fmt(dbl,2)+" periods"},{l:"Tripling time",v:fmt(Math.log(3)/r,2)+" periods"}]);
}

// ─────────────────── Ideal Gas ────────────────────────────────────
IMPLS["Ideal Gas Law (PV=nRT)"] = IMPLS["Ideal Gas Law"] = {
  html:`<p style="color:var(--muted);font-size:13px;margin-bottom:16px">PV = nRT — enter any three to solve for the fourth.</p>
  <div class="generic-inputs">
  <div class="field-row"><label>Pressure (atm)</label><input type="number" id="ig-p" placeholder="" step="any"></div>
  <div class="field-row"><label>Volume (L)</label><input type="number" id="ig-v" placeholder="" step="any"></div>
  <div class="field-row"><label>Moles (n)</label><input type="number" id="ig-n" placeholder="" step="any"></div>
  <div class="field-row"><label>Temperature (K)</label><input type="number" id="ig-t" placeholder="" step="any"></div>
  </div>
  <button class="calc-btn" onclick="calcIdealGas()">Solve</button>
  <div class="result-box" id="result-box"></div>`,
  formula:"PV = nRT  |  R = 0.08206 L·atm/(mol·K)"
};
function calcIdealGas(){
  const R=0.082057;
  const P=parseFloat(document.getElementById("ig-p").value);
  const V=parseFloat(document.getElementById("ig-v").value);
  const n=parseFloat(document.getElementById("ig-n").value);
  const T=parseFloat(document.getElementById("ig-t").value);
  const known=[P,V,n,T].filter(x=>!isNaN(x));
  if(known.length<3)return setResult([{l:"Error",v:"Enter at least 3 values"}]);
  let res;
  if(isNaN(P))res=[{l:"Pressure",v:fmt(n*R*T/V,6)+" atm"}];
  else if(isNaN(V))res=[{l:"Volume",v:fmt(n*R*T/P,6)+" L"}];
  else if(isNaN(n))res=[{l:"Moles",v:fmt(P*V/(R*T),6)+" mol"}];
  else res=[{l:"Temperature",v:fmt(P*V/(n*R),4)+" K"},{l:"°C",v:fmt(P*V/(n*R)-273.15,4)+" °C"}];
  setResult(res);
}

// ─────────────────── util ─────────────────────────────────────────
function slugify(s){return s.toLowerCase().replace(/[^a-z0-9]/g,"-")}
function esc(s){return (s||"").replace(/'/g,"\\'")}

// ─────────────────── TRANSLATION ──────────────────────────────────
function googleTranslateElementInit() {
  new google.translate.TranslateElement({
    pageLanguage: 'en',
    includedLanguages: 'es,fr,de,it,pt,zh-CN,ja,ko,ar,ru,hi',
    autoDisplay: false
  }, 'google_translate_element');
}

function toggleLangPanel() {
  const panel   = document.getElementById('lang-panel');
  const trigger = document.getElementById('lang-trigger');
  const open    = panel.classList.toggle('open');
  trigger.classList.toggle('open', open);
}

// Close panel when clicking outside
document.addEventListener('click', function(e) {
  const dd = document.getElementById('lang-dropdown');
  if (dd && !dd.contains(e.target)) {
    document.getElementById('lang-panel').classList.remove('open');
    document.getElementById('lang-trigger').classList.remove('open');
  }
});

function pickLang(el) {
  const lang   = el.dataset.lang;
  const flag   = el.dataset.flag;
  const name   = el.dataset.name;
  const native = el.dataset.native;

  // Update trigger display
  document.getElementById('lt-flag').src = `https://flagcdn.com/28x21/${flag}.png`;
  document.getElementById('lt-flag').alt = flag.toUpperCase();
  document.getElementById('lt-name').textContent = name + (native && native !== name ? ' / ' + native : '');

  // Mark active
  document.querySelectorAll('.lang-opt').forEach(o => o.classList.remove('active'));
  el.classList.add('active');

  // Close panel
  document.getElementById('lang-panel').classList.remove('open');
  document.getElementById('lang-trigger').classList.remove('open');

  // Trigger translation
  translatePage(lang);
}

function translatePage(lang) {
  if (!lang || lang === 'en') {
    document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
    document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; domain=' + location.hostname;
    location.reload();
    return;
  }
  document.cookie = 'googtrans=/en/' + lang + '; path=/';
  document.cookie = 'googtrans=/en/' + lang + '; path=/; domain=' + location.hostname;
  const tryTranslate = () => {
    const combo = document.querySelector('.goog-te-combo');
    if (combo) { combo.value = lang; combo.dispatchEvent(new Event('change')); }
  };
  const existing = document.querySelector('.goog-te-combo');
  if (existing) { tryTranslate(); }
  else if (!document.getElementById('gt-script')) {
    const s = document.createElement('script');
    s.id  = 'gt-script';
    s.src = '//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit';
    s.onload = () => setTimeout(tryTranslate, 900);
    document.head.appendChild(s);
  }
}
